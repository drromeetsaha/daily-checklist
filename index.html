<html lang="en">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative side elements */
        .charm {
            position: fixed;
            font-size: 40px;
            opacity: 0.15;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .charm-left-1 {
            left: 20px;
            top: 10%;
            animation-delay: 0s;
        }

        .charm-left-2 {
            left: 30px;
            top: 50%;
            animation-delay: 1s;
        }

        .charm-right-1 {
            right: 20px;
            top: 15%;
            animation-delay: 2s;
        }

        .charm-right-2 {
            right: 30px;
            top: 60%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(20px);
            }
        }

        .container {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(212, 175, 55, 0.1);
            max-width: 680px;
            width: 100%;
            padding: 50px 40px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 30px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .date {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.5px;
        }

        .day {
            font-size: 16px;
            color: #b0b0b0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .quote-section {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, rgba(212, 175, 55, 0.02) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 25px;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: #d4af37;
            font-style: italic;
            line-height: 1.6;
            font-weight: 600;
        }

        .quote-author {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            font-weight: 500;
        }

        .stats {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .stat-label {
            color: #888;
            font-weight: 500;
        }

        .stat-number {
            font-weight: 700;
            color: #d4af37;
            font-size: 20px;
            font-family: 'Playfair Display', serif;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            padding: 18px 22px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.03) 0%, rgba(212, 175, 55, 0) 100%);
            border-radius: 14px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .task::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #d4af37, #a88a2c);
            border-radius: 14px 0 0 14px;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .task:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.08) 0%, rgba(212, 175, 55, 0.02) 100%);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateX(6px);
        }

        .task:hover::before {
            opacity: 1;
        }

        .task.completed {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.08) 0%, rgba(76, 175, 80, 0) 100%);
            border-color: rgba(76, 175, 80, 0.2);
            opacity: 0.65;
        }

        .task.completed::before {
            background: linear-gradient(180deg, #4caf50, #388e3c);
            opacity: 1;
        }

        .task.completed .time,
        .task.completed .description {
            color: #777;
            text-decoration: line-through;
        }

        .checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            font-size: 16px;
            font-weight: bold;
        }

        .task:hover .checkbox {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
        }

        .task.completed .checkbox {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .time {
            font-size: 12px;
            font-weight: 700;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .description {
            font-size: 15px;
            color: #e8e8e8;
            line-height: 1.5;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 10px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .badge.teaching {
            background: rgba(255, 107, 107, 0.15);
            color: #ff8a80;
            border-color: rgba(255, 107, 107, 0.3);
        }

        .badge.learning {
            background: rgba(78, 205, 196, 0.15);
            color: #80deea;
            border-color: rgba(78, 205, 196, 0.3);
        }

        .badge.rest {
            background: rgba(149, 225, 211, 0.15);
            color: #80deea;
            border-color: rgba(149, 225, 211, 0.3);
        }

        .progress-section {
            margin: 30px 0;
            padding: 25px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, rgba(212, 175, 55, 0) 100%);
            border-radius: 14px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .progress-label {
            font-size: 13px;
            color: #d4af37;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f4d03f);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #777;
            font-size: 12px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 25px;
            font-weight: 500;
        }

        .reset-btn {
            margin-top: 25px;
            padding: 12px 24px;
            background: rgba(212, 175, 55, 0.1);
            border: 1.5px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #d4af37;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .reset-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }

        .reset-btn:active {
            transform: scale(0.98);
        }

        .motivational-emoji {
            font-size: 24px;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 25px;
                border-radius: 18px;
            }

            .title {
                font-size: 20px;
            }

            .date {
                font-size: 28px;
            }

            .task {
                padding: 16px 18px;
                gap: 14px;
            }

            .stats {
                flex-direction: column;
                gap: 12px;
            }

            .stat {
                padding: 12px 16px;
                justify-content: space-between;
            }

            .progress-section {
                padding: 18px;
            }

            .charm {
                font-size: 30px;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeInDown 0.6s ease-out;
        }

        .task {
            animation: fadeInDown 0.4s ease-out backwards;
        }

        .task:nth-child(1) { animation-delay: 0.1s; }
        .task:nth-child(2) { animation-delay: 0.15s; }
        .task:nth-child(3) { animation-delay: 0.2s; }
        .task:nth-child(n+4) { animation-delay: 0.25s; }
    </style>
</head>

        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        function getRandomQuote() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
            const quoteIndex = dayOfYear % quotes.length;
            return quotes[quoteIndex];
        }

        function formatDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            const dayStr = days[today.getDay()];
            return { dateStr, dayStr, dayIndex: today.getDay() };
        }

        function loadTasks() {
            const { dateStr, dayStr, dayIndex } = formatDate();
            const tasks = schedules[dayIndex];
            const quote = getRandomQuote();

            document.getElementById('dateDisplay').textContent = dateStr;
            document.getElementById('dayDisplay').textContent = dayStr.toUpperCase();
            document.getElementById('quoteText').textContent = `"${quote.text}"`;
            document.getElementById('quoteAuthor').textContent = `- ${quote.author}`;
            document.getElementById('quoteEmoji').textContent = quote.emoji;

            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = '';

            tasks.forEach((task, index) => {
                const taskEl = document.createElement('div');
                const taskId = `task-${dayIndex}-${index}`;
                const isCompleted = localStorage.getItem(taskId) === 'true';

                taskEl.className = `task ${isCompleted ? 'completed' : ''}`;
                taskEl.innerHTML = `
                    <div class="checkbox" onclick="toggleTask('${taskId}', this.parentElement)">
                        ${isCompleted ? '✓' : ''}
                    </div>
                    <div class="task-content">
                        <div class="time">${task.time}</div>
                        <div class="description">
                            ${task.task}
                            <span class="badge ${task.type === 'teaching' ? 'teaching' : task.type === 'learning' ? 'learning' : 'rest'}">
                                ${task.type.charAt(0).toUpperCase() + task.type.slice(1)}
                            </span>
                        </div>
                    </div>
                `;
                tasksList.appendChild(taskEl);

                if (isCompleted) {
                    taskEl.classList.add('completed');
                }
            });

            updateStats(tasks);
            updateLastUpdate();
        }

        function toggleTask(taskId, taskEl) {
            const isCompleted = localStorage.getItem(taskId) === 'true';
            localStorage.setItem(taskId, !isCompleted);

            const { dayIndex } = formatDate();
            const tasks = schedules[dayIndex];
            loadTasks();
        }

        function updateStats(tasks) {
            const { dayIndex } = formatDate();
            let completed = 0;

            tasks.forEach((_, index) => {
                const taskId = `task-${dayIndex}-${index}`;
                if (localStorage.getItem(taskId) === 'true') {
                    completed++;
                }
            });

            const total = tasks.length;
            const percentage = (completed / total) * 100;

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function resetDay() {
            const { dayIndex } = formatDate();
            const tasks = schedules[dayIndex];

            if (confirm('Reset all tasks for today?')) {
                tasks.forEach((_, index) => {
                    const taskId = `task-${dayIndex}-${index}`;
                    localStorage.removeItem(taskId);
                });
                loadTasks();
            }
        }

        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        window.addEventListener('load', loadTasks);

        setInterval(() => {
            const now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0) {
                loadTasks();
            }
        }, 60000);
