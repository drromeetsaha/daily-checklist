<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Checklist - Doc's Schedule</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .date {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .day {
            font-size: 18px;
            color: #666;
            font-weight: 500;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-number {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .task:hover {
            background: #eef0f7;
            transform: translateX(5px);
        }

        .task.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
            opacity: 0.7;
        }

        .task.completed .time,
        .task.completed .description {
            color: #999;
            text-decoration: line-through;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.3s ease;
        }

        .task.completed .checkbox {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .time {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 15px;
            color: #333;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            background: #ffd700;
            color: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            margin-top: 4px;
        }

        .badge.teaching {
            background: #ff6b6b;
            color: white;
        }

        .badge.learning {
            background: #4ecdc4;
            color: white;
        }

        .badge.rest {
            background: #95e1d3;
            color: #333;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #e0e0e0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 16px;
            }

            .date {
                font-size: 24px;
            }

            .task {
                padding: 12px;
                gap: 12px;
            }

            .stats {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>

        function formatDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            const dayStr = days[today.getDay()];
            return { dateStr, dayStr, dayIndex: today.getDay() };
        }

        function loadTasks() {
            const { dateStr, dayStr, dayIndex } = formatDate();
            const tasks = schedules[dayIndex];

            document.getElementById('dateDisplay').textContent = dateStr;
            document.getElementById('dayDisplay').textContent = dayStr.toUpperCase();

            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = '';

            tasks.forEach((task, index) => {
                const taskEl = document.createElement('div');
                const taskId = `task-${dayIndex}-${index}`;
                const isCompleted = localStorage.getItem(taskId) === 'true';

                taskEl.className = `task ${isCompleted ? 'completed' : ''}`;
                taskEl.innerHTML = `
                    <div class="checkbox" onclick="toggleTask('${taskId}', this.parentElement)">
                        ${isCompleted ? '✓' : ''}
                    </div>
                    <div class="task-content">
                        <div class="time">${task.time}</div>
                        <div class="description">
                            ${task.task}
                            <span class="badge ${task.type === 'teaching' ? 'teaching' : task.type === 'learning' ? 'learning' : 'rest'}">
                                ${task.type.charAt(0).toUpperCase() + task.type.slice(1)}
                            </span>
                        </div>
                    </div>
                `;
                tasksList.appendChild(taskEl);

                if (isCompleted) {
                    taskEl.classList.add('completed');
                }
            });

            updateStats(tasks);
            updateLastUpdate();
        }

        function toggleTask(taskId, taskEl) {
            const isCompleted = localStorage.getItem(taskId) === 'true';
            localStorage.setItem(taskId, !isCompleted);

            const { dayIndex } = formatDate();
            const tasks = schedules[dayIndex];
            loadTasks();
        }

        function updateStats(tasks) {
            const { dayIndex } = formatDate();
            let completed = 0;

            tasks.forEach((_, index) => {
                const taskId = `task-${dayIndex}-${index}`;
                if (localStorage.getItem(taskId) === 'true') {
                    completed++;
                }
            });

            const total = tasks.length;
            const percentage = (completed / total) * 100;

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function resetDay() {
            const { dayIndex } = formatDate();
            const tasks = schedules[dayIndex];

            if (confirm('Reset all tasks for today?')) {
                tasks.forEach((_, index) => {
                    const taskId = `task-${dayIndex}-${index}`;
                    localStorage.removeItem(taskId);
                });
                loadTasks();
            }
        }

        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        // Load tasks when page loads
        window.addEventListener('load', loadTasks);

        // Reset daily tasks at midnight
        setInterval(() => {
            const now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0) {
                loadTasks();
            }
        }, 60000); // Check every minute
